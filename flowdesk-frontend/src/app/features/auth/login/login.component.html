<!-- login.component.html -->
<div class="login-container">
  <mat-card class="login-card">

    <!-- Header -->
    <div class="login-header">
      <h2 class="login-title">ยินดีต้อนรับ</h2>
      <p class="login-subtitle">กรุณากรอกข้อมูลเพื่อเข้าสู่ระบบ</p>
    </div>

    <!-- Form -->
    <div class="login-body">
      <form [formGroup]="form" class="login-form" (ngSubmit)="login()">

        <!-- Email -->
        <div class="form-field-wrapper">
          <label class="field-label">อีเมล</label>
          <mat-form-field appearance="outline">
            <input
              matInput
              formControlName="email"
              type="email"
              placeholder="example@email.com"
              [disabled]="isLoading"
            />
            <mat-icon matPrefix>email</mat-icon>
            <mat-error *ngIf="form.get('email')?.hasError('required')">
              กรุณากรอกอีเมล
            </mat-error>
            <mat-error *ngIf="form.get('email')?.hasError('email')">
              รูปแบบอีเมลไม่ถูกต้อง
            </mat-error>
          </mat-form-field>
        </div>

        <!-- Password -->
        <div class="form-field-wrapper">
          <label class="field-label">รหัสผ่าน</label>
          <mat-form-field appearance="outline">
            <input
              matInput
              formControlName="password"
              [type]="hidePassword ? 'password' : 'text'"
              placeholder="กรอกรหัสผ่านของคุณ"
              [disabled]="isLoading"
            />
            <mat-icon matPrefix>lock</mat-icon>
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="togglePasswordVisibility()"
              [disabled]="isLoading"
              [attr.aria-label]="'แสดง/ซ่อนรหัสผ่าน'"
              [attr.aria-pressed]="hidePassword"
            >
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="form.get('password')?.hasError('required')">
              กรุณากรอกรหัสผ่าน
            </mat-error>
            <mat-error *ngIf="form.get('password')?.hasError('minlength')">
              รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร
            </mat-error>
          </mat-form-field>
        </div>

        <!-- Forgot Password -->
        <div class="forgot-password-container">
          <a [routerLink]="['/forgot-password']" class="forgot-link">
            ลืมรหัสผ่าน
          </a>
        </div>

        <!-- Submit -->
        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="login-button"
          [disabled]="isLoading"
        >
          <mat-spinner
            *ngIf="isLoading"
            diameter="20"
            style="display: inline-block; margin-right: 8px;"
          ></mat-spinner>
          <span>{{ isLoading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ' }}</span>
        </button>

        <!-- Register Link -->
        <div class="signup-link">
          ยังไม่มีบัญชีผู้ใช้ ?
          <a [routerLink]="['/register']" class="signup-text">สมัครสมาชิก</a>
        </div>

      </form>
    </div>

  </mat-card>
</div>
