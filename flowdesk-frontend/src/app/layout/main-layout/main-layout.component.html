<div class="layout-wrapper" [class.sidebar-open]="isSidebarOpen">

  <!-- SIDEBAR -->
  <div class="sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-header">
      <mat-icon class="brand-icon">description</mat-icon>
      <span class="brand-name">FlowDesk</span>
    </div>

    <div class="sidebar-menu">
      <div class="menu-item" [class.active]="activeRoute === 'dashboard'" (click)="navigateTo('dashboard')">
        <mat-icon>dashboard</mat-icon><span>Dashboard</span>
      </div>
      <div class="menu-item" [class.active]="activeRoute === 'user-management'" (click)="navigateTo('user-management')">
        <mat-icon>people</mat-icon><span>User Management</span>
      </div>
      <div class="menu-item" [class.active]="activeRoute === 'requests'" (click)="navigateTo('requests')">
        <mat-icon>assignment</mat-icon><span>All Requests</span>
      </div>
      <div class="menu-item" [class.active]="activeRoute === 'approvals'"
           (click)="navigateTo('approvals')" *ngIf="canApprove()">
        <mat-icon>pending_actions</mat-icon>
        <span>Approvals</span>
        <span class="badge" *ngIf="pendingApprovals.length > 0">{{ pendingApprovals.length }}</span>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content" [class.sidebar-open]="isSidebarOpen">

    <mat-toolbar class="top-bar">
      <div class="toolbar-content">
        <button mat-icon-button class="menu-toggle" (click)="toggleSidebar()">
          <mat-icon>menu</mat-icon>
        </button>
        <span class="spacer"></span>

        <div class="user-section">
          <div class="user-avatar">{{ currentUser.avatar }}</div>
          <div class="user-details">
            <span class="user-name">{{ currentUser.name }}</span>
            <span class="user-role">{{ currentUser.role }}</span>
          </div>
          <!-- ปุ่ม Logout โดยตรง ไม่มี dropdown -->
          <button class="logout-btn" (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </div>

      </div>
    </mat-toolbar>

    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
