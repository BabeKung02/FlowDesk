# ต้องมีไฟล์นี้เพราะ Angular ใช้ HTML5 routing (pushState)
# ถ้าไม่มี เวลา refresh หน้า /dashboard จะได้ 404 จาก Nginx
# try_files บอกว่า: ลองหาไฟล์จริงก่อน ถ้าไม่เจอให้ส่ง index.html แทน
# แล้วปล่อยให้ Angular Router จัดการเอง
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, images) นาน 1 ปี
    # Angular ใส่ hash ใน filename อยู่แล้ว เช่น main.abc123.js
    # ดังนั้น cache นานได้อย่างปลอดภัย
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ปิด access log สำหรับ favicon เพื่อลด noise ใน log
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
